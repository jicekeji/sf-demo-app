<!doctype html>
<html lang="zh">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SuperFactory Demo</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main>
    <h1>SuperFactory Demo</h1>
    <p class="tag">🚧 施工中 — 这个应用将由 SuperFactory 工厂从 0 到 1 自动构建。</p>
    <p class="meta">seeded skeleton · awaiting factory-built features</p>

    <section class="cards">
      <article class="card">
        <span class="card-icon" aria-hidden="true">🏗️</span>
        <h2 class="card-title">自动构建</h2>
        <p class="card-desc">从需求到可部署应用，自动完成构建。</p>
      </article>
      <article class="card">
        <span class="card-icon" aria-hidden="true">🛡️</span>
        <h2 class="card-title">质量门禁</h2>
        <p class="card-desc">自动化测试与审查，守住质量底线。</p>
      </article>
      <article class="card">
        <span class="card-icon" aria-hidden="true">🤖</span>
        <h2 class="card-title">自治运维</h2>
        <p class="card-desc">持续监控与自愈，无人值守运行。</p>
      </article>
    </section>
  </main>
</body>
</html>
